<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body { padding: 20px; font-family: sans-serif; }

  /* Table 基本設定 */
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed; /* 確保寬度依百分比分配 */
    margin-bottom: 15px;
  }

  td {
    height: 120px;
    font-size: 14px;
    border: 1px solid rgba(0,0,0,0.1);
    
    /* 文字置中 */
    text-align: center;
    vertical-align: middle;
    color: white;
    font-weight: bold;

    /* 背景圖片設定 */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
</style>
</head>
<body>

  <!-- 第一排：100% -->
  <table>
    <tr>
      <td style="width: 100%; background-image:url('https://placeholdpicsum.dev/photo/1200/200')">
        100%
      </td>
    </tr>
  </table>

  <!-- 第二排：50% + 50% -->
  <table>
    <tr>
      <td style="width: 50%; background-image:url('https://placeholdpicsum.dev/photo/600/200')">
        50%
      </td>
      <td style="width: 50%; background-image:url('https://placeholdpicsum.dev/photo/601/200')">
        50%
      </td>
    </tr>
  </table>

  <!-- 第三排：20% + 60% + 20% -->
  <table>
    <tr>
      <td style="width: 20%; background-image:url('https://placeholdpicsum.dev/photo/200/200')">
        20%
      </td>
      <td style="width: 60%; background-image:url('https://placeholdpicsum.dev/photo/600/200')">
        60%
      </td>
      <td style="width: 20%; background-image:url('https://placeholdpicsum.dev/photo/201/200')">
        20%
      </td>
    </tr>
  </table>

  <!-- 第四排：25% x 4 -->
  <table>
    <tr>
      <td style="width: 25%; background-image:url('https://placeholdpicsum.dev/photo/300/200')">
        25%
      </td>
      <td style="width: 25%; background-image:url('https://placeholdpicsum.dev/photo/301/200')">
        25%
      </td>
      <td style="width: 25%; background-image:url('https://placeholdpicsum.dev/photo/302/200')">
        25%
      </td>
      <td style="width: 25%; background-image:url('https://placeholdpicsum.dev/photo/303/200')">
        25%
      </td>
    </tr>
  </table>

</body>
</html>
