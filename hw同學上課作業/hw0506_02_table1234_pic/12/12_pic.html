<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    /* 1. 移除表格與儲存格之間的所有間隙 */
    table {
        width: 80%;
        text-align: center;
        margin: 0 auto; /* 置中並移除上下間距，讓四個 table 貼合 */
        border-collapse: collapse; /* 合併邊框 */
        border-spacing: 0;         /* 徹底消除單元格間距 */
        border: 1px solid black; 
        table-layout: fixed;      /* 強制平分寬度 */
    }

    td {
        border: 1px solid black; 
        padding: 0;                /* 確保內部沒有任何留白 */
        height: 1px;               /* 技巧：讓 td 盡可能縮小，強迫裡面的 div 撐開它 */
    }

    .box {
        width: 100%;
        height: 100%;             /* 搭配 td 的 height: 1px，這會強迫 div 填滿整個格線 */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 8px;
        box-sizing: border-box;
        padding: 15px;            /* 這是背景色內的間距 */
        font-size: 20px;
        font-weight: bold;
        color: #1565c0;
        background-color: lightblue; /* 建議統一寫在這裡，除非顏色不同 */
    }

    .box img {
        max-width: 100%;
        height: auto;
        display: block;
    }
</style>
</head>

<body>
    <table>
        <tr>
            <td>
                <div class="box box11">
                    1
                    <img src="img/01.png" alt="第一格漫畫">
                </div>
            </td>
        </tr>
    </table>

    <table>
        <tr>
            <td>
                <div class="box box21">
                    2
                    <img src="img/02.png" alt="第二格漫畫">
                </div>
            </td>
            <td>
                <div class="box box22">
                    3
                    <img src="img/03.png" alt="第三格漫畫">
                </div>
            </td>
        </tr>
    </table>

    <table>
        <tr>
            <td width="33.33%">
                <div class="box box31">
                    4
                    <img src="img/04.png" alt="第四格漫畫">
                </div>
            </td>
            <td width="33.33%">
                <div class="box box32">
                    5
                    <img src="img/05.png" alt="第五格漫畫">
                </div>
            </td>
            <td width="33.33%">
                <div class="box box33">
                    6
                    <img src="img/06.png" alt="第六格漫畫">
                </div>
            </td>
        </tr>
    </table>

    <table>
        <tr>
            <td>
                <div class="box box41">
                    7
                    <img src="img/07.png" alt="第七格漫畫">
                </div>
            </td>
            <td>
                <div class="box box42">
                    8
                    <img src="img/08.png" alt="第八格漫畫">
                </div>
            </td>
            <td>
                <div class="box box43">
                    9
                    <img src="img/09.png" alt="第九格漫畫">
                </div>
            </td>
            <td>
                <div class="box box44">
                    10
                    <img src="img/10.png" alt="第十格漫畫">
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
