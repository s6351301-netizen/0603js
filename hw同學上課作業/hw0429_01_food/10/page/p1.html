<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
            margin: 0;    /* 關鍵：把網頁預設的白邊刪掉 */
            padding: 0;
        }

        p {
            margin: 0;    /* 關鍵：把段落預設的間距刪掉 */
        }

        img {
            width: 100vw;  /* 關鍵：100vw 代表螢幕寬度的 100% */
            height: auto;  /* 高度自動，才不會變形 */
            display: block; /* 消除圖片下方的微小縫隙 */
        }
</style>
<body>
    <p>
        <img src="./01.jpg" alt="">
    </p>
</body>
</html>
