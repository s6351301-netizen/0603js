<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北投地熱谷 - 旅 の 記憶</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@500;600&family=Satisfy&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcf8f8;
            --card-bg: #ffffff;
            --accent-pink: #ffb6c1;
            --accent-dusty: #e0b0b0;
            --text-dark: #3a3a3a;
            --text-muted: #777777;
            --border-light: #f0f0f0;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--text-dark);
            line-height: 1.8;
            margin: 0;
            padding-bottom: 80px;
        }

        /* --- 返回按鈕 --- */
        .back-nav {
            width: 90%;
            max-width: 800px;
            margin: 40px auto 20px;
        }

        .back-to-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.95rem;
            transition: all 0.3s var(--ease);
        }

        .back-to-home:hover {
            color: var(--accent-dusty);
            transform: translateX(-5px);
        }

        /* --- 內容容器 --- */
        .article-container {
            width: 90%;
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
        }

        /* 頂部大圖區 */
        .hero-image {
            width: 100%;
            height: 400px;
            overflow: hidden;
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 文章內容區 */
        .article-content {
            padding: 50px 60px;
        }

        .article-meta {
            font-size: 0.8rem;
            color: var(--accent-dusty);
            letter-spacing: 3px;
            margin-bottom: 15px;
            display: block;
        }

        h1 {
            font-family: 'Noto Serif TC', serif;
            font-size: 2.2rem;
            margin: 0 0 30px;
            color: var(--text-dark);
        }

        .main-text {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            text-align: justify;
        }

        /* 照片網格區 */
        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .photo-grid img {
            width: 100%;
            border-radius: 12px;
            transition: transform 0.4s var(--ease);
        }

        .photo-grid img:hover {
            transform: scale(1.02);
        }

        /* 資訊小標籤 */
        .info-box {
            background-color: #fafafa;
            border-left: 4px solid var(--accent-pink);
            padding: 25px;
            border-radius: 4px 12px 12px 4px;
            margin-top: 50px;
        }

        .info-title {
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 10px;
            display: block;
        }

        .info-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .info-list li {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 行動按鈕 */
        .action-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 35px;
            background-color: var(--accent-dusty);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: all 0.3s var(--ease);
        }

        .action-btn:hover {
            background-color: var(--accent-pink);
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .article-content {
                padding: 30px;
            }

            .photo-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <nav class="back-nav">
        <a href="../20260429_06_food.html" class="back-to-home">
            <span class="arrow">←</span> 返回旅程首頁
        </a>
    </nav>

    <main class="article-container">
        <div class="hero-image">
            <img src="./img/23.jpg" alt="地熱谷風景">
        </div>

        <div class="article-content">
            <span class="article-meta">BEITOU ‧ TAIPEI</span>
            <h1>北投地熱谷：大自然的神秘煙霧</h1>

            <p class="main-text">
                地熱谷位在北投溫泉公園旁邊，是北投溫泉的源頭之一。這裡的溫泉水質屬於「青磺泉」，含有微量的放射性元素「鐳」，全世界僅有北投與日本玉川溫泉擁有此類泉質，因此極為珍貴。
                <br><br>
                走在新建好的環湖步道上，可以看見湖面長年漫天迷濛的白煙，彷彿走進了人間仙境或是地獄般的奇幻世界，也因此這裡曾被稱為「地獄谷」。
            </p>

            <div class="photo-grid">
                <img src="./img/12.jpg" alt="地熱景觀">
                <img src="./img/13.jpg" alt="步道景觀">
            </div>

            <div class="info-box">
                <span class="info-title">旅遊小資訊</span>
                <ul class="info-list">
                    <li>📍 台北市北投區中山路</li>
                    <li>⏰ 開放時間：09:00 - 18:00 (週一關閉)</li>
                    <li>💰 門票：免費參觀</li>
                    <li>🚇 交通：捷運新北投站步行約 15 分鐘</li>
                </ul>
                <a href="https://maps.app.goo.gl/MyZfbS51jz3WADH17" target="_blank" class="action-btn">📍 開啟地圖導航</a>
            </div>
        </div>
    </main>

</body>

</html>
