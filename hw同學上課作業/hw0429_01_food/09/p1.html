<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極鮮食材 - 極境 | 頂級鐵板割烹</title>
    <style>
        /* 基礎樣式重置 */
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f0f;
            color: #f4f4f4;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* 主要容器：使用 Flexbox 實現圖文並列 */
        .content-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 60px 10%;
            gap: 60px;
            flex-wrap: wrap;
            /* 手機版自動換行 */
        }

        /* 圖片區塊樣式 */
        .img-container {
            flex: 1;
            min-width: 320px;
            position: relative;
        }

        .img-container img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            border-left: 8px solid #d4af37;
            /* 金色裝飾邊框 */
            box-shadow: 20px 20px 60px rgba(0, 0, 0, 0.7);
            transition: transform 0.5s ease;
        }

        .img-container:hover img {
            transform: scale(1.02);
        }

        /* 文字區塊樣式 */
        .text-container {
            flex: 1;
            min-width: 320px;
            padding: 20px;
        }

        .category-tag {
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: block;
        }

        .text-container h2 {
            color: #ffffff;
            font-size: 3rem;
            margin: 0 0 30px 0;
            line-height: 1.2;
            font-weight: 700;
        }

        .text-container p {
            line-height: 2;
            font-size: 1.1rem;
            color: #bcbcbc;
            margin-bottom: 40px;
            text-align: justify;
        }

        /* 按鈕樣式 */
        .cta-button {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid #d4af37;
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
        }

        .cta-button:hover {
            background-color: #d4af37;
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* 響應式微調 */
        @media (max-width: 768px) {
            .content-wrapper {
                padding: 40px 20px;
            }

            .text-container h2 {
                font-size: 2rem;
            }

            .img-container {
                order: 1;
            }

            /* 圖片在上 */
            .text-container {
                order: 2;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <main class="content-wrapper">
        <div class="img-container">
            <img src="https://images.unsplash.com/photo-1559742811-822873691df8?auto=format&fit=crop&q=80&w=1000"
                alt="頂級龍蝦食材">
        </div>

        <div class="text-container">
            <span class="category-tag">Premium Ingredients</span>
            <h2>來自深海的<br>純粹饋贈</h2>
            <p>
                「極境」對食材的挑選近乎偏執。我們堅持選用藍龍蝦、北海道生食級干貝與澳洲活鮑魚。
                這些瑰寶每日晨間由港口直送，在主職人精湛的溫控下，將每一絲鮮甜完整鎖在鐵板的瞬熱之中。
                不需要過多的調味，食材本身的鮮甜就是最華麗的樂章。
            </p>
            <a href="../index.html" class="cta-button">返回品牌首頁</a>
        </div>
    </main>

    <section
        style="background: url('https://images.unsplash.com/photo-1544148103-0773bf10d330?auto=format&fit=crop&q=80&w=1000') center/cover fixed; height: 300px; width: 100%; border-top: 1px solid #d4af37;">
    </section>

</body>

</html>
