<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <title>會員自動登入與廣告執行</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; margin: 0; }
        /* 設定 iframe 的樣式 */
        .full-iframe {
            width: 80vw;    /* 視窗寬度的 80% */
            height: 80vh;   /* 視窗高度的 80% */
            border: 2px solid #ccc;
            display: block;
            margin: 20px 0;
        }
        table { border-collapse: collapse; width: 100%; max-width: 1800px; margin-bottom: 24px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #f4f4f4; }
    </style>
</head>
<body>
    <div style="color: rgb(47, 0, 255); font-weight: bold;">

        <button onclick="window.open('./login.php', '_blank')">點此按鈕,開啟執行,開新網頁顯示結果頁面(須等約1-2分鐘)</button>
        </h3>
        
        <!-- 加入 class 控制尺寸 -->
        <iframe src="https://www.emailcash.com.tw/Rewards/Survey.aspx" class="full-iframe" frameborder="0"></iframe>

        
        
    </div>
