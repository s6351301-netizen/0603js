
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merriam-Webster 快速查詢器 + 計算機</title>
    <style>
        body { display: flex; flex-direction: column; height: 100vh; margin: 0; box-sizing: border-box; font-family: sans-serif; }
        
        /* 新增的計算機區域樣式 */
        .calc-container { 
            display: flex; 
            padding: 10px; 
            background: #f0f2f5; 
            border-bottom: 1px solid #ccc;
            gap: 20px;
        }
        .calc-inputs { flex: 1; display: flex; gap: 5px; align-items: center; }
        .calc-result { flex: 1; display: flex; align-items: center; font-weight: bold; color: #007bff; }
        input[type="number"] { width: 80px; padding: 5px; }
        select { padding: 5px; }

        /* 原有的查詢區域樣式 */
        .search-container { padding: 10px; background: #fff; border-bottom: 1px solid #ccc; }
        #wordInput { padding: 5px; width: 200px; }
        button { padding: 5px 15px; cursor: pointer; }
        
        iframe { flex-grow: 1; width: 100%; border: none; }
    </style>
</head>
<body>

    <!-- 第一區：兩欄式四則運算 -->
    <div class="calc-container">
        <div class="calc-inputs">
            <input type="number" id="num1" placeholder="數值1" oninput="calculate()">
            <select id="operator" onchange="calculate()">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">×</option>
                <option value="/">÷</option>
            </select>
            <input type="number" id="num2" placeholder="數值2" oninput="calculate()">
        </div>
        <div class="calc-result">
            結果：<span id="resText">0</span>
        </div>
    </div>

    <!-- 第二區：查詢器 -->
    <div class="search-container">
        <input type="text" id="wordInput" placeholder="輸入英文單字..." onkeypress="if(event.key==='Enter') searchWord()">
        <button onclick="searchWord()">查詢</button>
    </div>

    <iframe id="dictFrame" name="dictFrame" src="about:blank"></iframe>

    <script>
        // 計算邏輯
        function calculate() {
            const n1 = parseFloat(document.getElementById('num1').value);
            const n2 = parseFloat(document.getElementById('num2').value);
            const op = document.getElementById('operator').value;
            const resSpan = document.getElementById('resText');

            if (isNaN(n1) || isNaN(n2)) {
                resSpan.innerText = "等待輸入...";
                return;
            }

            let result;
            switch (op) {
                case '+': result = n1 + n2; break;
                case '-': result = n1 - n2; break;
                case '*': result = n1 * n2; break;
                case '/': result = n2 !== 0 ? (n1 / n2).toFixed(2) : "不能除以0"; break;
            }
            resSpan.innerText = result;
        }

        // 字典查詢邏輯
        function searchWord() {
            const word = document.getElementById('wordInput').value.trim();
            if (word) {
                const url = `https://www.merriam-webster.com/dictionary/${encodeURIComponent(word)}`;
                document.getElementById('dictFrame').src = url;
            } else {
                alert('請輸入單字！');
            }
        }
    </script>

</body>
</html>
