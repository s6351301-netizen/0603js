<!DOCTYPE html>
<html>
<style>
     table,
     th,
     td {
          border: 2px solid black;
     }
      h3 {
            text-align: center;
      }
      p{
            text-align: center;}
</style>

<body>

     <h3>練習</h3>

     <table style="width:100%">
          <tr>
               <th>1</th>
               <th>2</th>
               <th>3</th>
               <th>4</th>
               <th>5</th>
               <th>6</th>
          </tr>
          <tr>
               <th>7</th>
               <th colspan="5">8</th>
               <!-- <th>9</th>
               <th>10</th>
               <th>11</th>
               <th>12</th> -->
          </tr>
          <tr>
               <th>13</th>
               <th rowspan="2">14</th>
               <th colspan="3">15</th>
               <!-- <th>16</th>
               <th>17</th> -->
               <th>18</th>
          </tr>
          <tr>
               <th>19</th>
               <!-- <th>20</th> -->
               <th>21</th>
               <th>22</th>
               <th>23</th>
               <th>24</th>
          </tr>
          <tr>
               <th>25</th>
               <th>26</th>
               <th>27</th>
               <th>28</th>
               <th>29</th>
               <th rowspan="2">30</th>
          </tr>
          <tr>
               <th>31</th>
               <th>32</th>
               <th>33</th>
               <th>34</th>
               <th>35</th>
               <!-- <th>36</th> -->
          </tr>
          <tr>
               <th>37</th>
               <th colspan="5">38</th>
               <!-- <th>39</th>
               <th>40</th>
               <th>41</th>
               <th>42</th> -->
          </tr>
          <tr>
               <th>43</th>
               <th>44</th>
               <th rowspan="2">45</th>
               <th rowspan="3">46</th>
               <th rowspan="3">47</th>
               <th>48</th>
          </tr>
          <tr>
               <th>49</th>
               <th>50</th>
               <!-- <th>51</th> -->
               <!-- <th>52</th> -->
               <!-- <th>53</th> -->
               <th>54</th>
          </tr>
          <tr>
               <th>55</th>
               <th colspan="2">56</th>
               <!-- <th>57</th> -->
               <!-- <th>58</th> -->
               <!-- <th>59</th> -->
               <th>60</th>
          </tr>
     </table>

     <p>To understand the example better, we have added borders to the table.</p>

</body>

</html>
