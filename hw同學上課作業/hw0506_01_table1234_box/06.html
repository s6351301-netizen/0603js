<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            padding: 20px;
            font-family: sans-serif;
        }

        /* Table 基本設定 */
        table {
            width: 100%;
            border-collapse: collapse;
            /* 合併邊框 */
            table-layout: fixed;
            /* 強制分配寬度 */
            margin-bottom: 15px;
        }

        td {
            height: 100px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        /* 顏色設定 */
        /* 1. 霧藍 */
        .mist-blue {
            background-color: #90AFC5;
        }

        /* 2. 灰湖綠 */
        .sage-green {
            background-color: #768970;
            color: white;
        }

        /* 3. 煙燻粉 */
        .dusty-rose {
            background-color: #C18292;
            color: white;
        }

        /* 4. 燕麥色 */
        .oatmeal {
            background-color: #E2D1C3;
        }

        /* 5. 芥末暗黃 */
        .muted-gold {
            background-color: #C6A477;
        }

        /* 6. 磚瓦紅 */
        .terracotta {
            background-color: #A65D50;
            color: white;
        }

        /* 7. 深石板灰 */
        .slate-gray {
            background-color: #4A4E69;
            color: white;
        }

        /* 8. 奶茶棕 */
        .milk-tea {
            background-color: #AF8F7C;
        }
    </style>
</head>

<body>


    <table>
        <tr>
            <td class="mist-blue" style="width: 100%;">100% (11)</td>
        </tr>
    </table>

    <table>
        <tr>
            <td class="sage-green" style="width: 50%;">50% (21)</td>
            <td class="dusty-rose" style="width: 50%;">50% (22)</td>
        </tr>
    </table>

    <table>
        <tr>
            <td class="oatmeal" style="width: 20%;">20% (31)</td>
            <td class="muted-gold" style="width: 60%;">60% (32)</td>
            <td class="terracotta" style="width: 20%;">20% (33)</td>
        </tr>
    </table>

    <table>
        <tr>
            <td class="slate-gray" style="width: 25%;">25% (41)</td>
            <td class="milk-tea" style="width: 25%;">25% (42)</td>
            <td class="mist-blue" style="width: 25%;">25% (43)</td>
            <td class="sage-green" style="width: 25%;">25% (44)</td>
        </tr>
    </table>

</body>

</html>
