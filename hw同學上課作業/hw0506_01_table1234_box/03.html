<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            width: 100%;
            height: 100%;
        }

        .box {
            width: 100%;
            height: 25vh;
            background-color: blue;
        }

        .box1,
        .box2 {
            width: 100%;
            height: 25vh;
            background-color: brown;
        }

        .box3,
        .box4,
        .box5 {
            width: 100%;
            height: 25vh;
            background-color: rgb(231, 9, 231);
        }

        .box6,
        .box7,
        .box8,
        .box9 {
            width: 100%;
            height: 25vh;
            background-color: rgb(5, 238, 24);
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <td>

                <div class="box">

                </div>
            </td>
        </tr>
        <table>
            <tr>
                <td>
                    <div class="box1">

                    </div>
                </td>
                <td>
                    <div class="box2">

                    </div>
                </td>
            </tr>
        </table>
        <table>
            <tr>
                <td style="width: 20%;">
                    <div class="box3">

                    </div>
                </td>
                <td style="width: 60%;">
                    <div class="box4">

                    </div>
                </td>
                <td style="width: 20%;">
                    <div class="box5">

                    </div>
                </td>
            </tr>
        </table>
        <table>
            <tr>
                <td>
                    <div class="box6">

                    </div>
                </td>
                <td>
                    <div class="box7">

                    </div>
                </td>
                <td>
                    <div class="box8">

                    </div>
                </td>
                <td>
                    <div class="box9">

                    </div>
                </td>
            </tr>
        </table>
</body>

</html>
