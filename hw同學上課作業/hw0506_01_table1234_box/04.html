<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <style>
         body {
        font-family: Arial, Helvetica, sans-serif;
        width: 50%;

            }
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* 確保寬度嚴格按照百分比分配 */
            font-family: Arial, sans-serif;
            text-align: center;
        }

        th, td {
            border: 1px solid #333;
            padding: 15px;
        }

        /* 第一行：100% (合併 4 格) */
        .row-1 { width: 100%; background-color: #aca5f3; }

        /* 第二行：每個 50% (各合併 2 格) */
        .row-2 { width: 50%; background-color: #677981; }

        /* 第三行：每個 33.33% (這行需要手動調整 colspan 或單純分配寬度) */
        .row-3 { width: 33.33%; background-color: #97ca65; }

        /* 第四行：每個 25% (原始 4 格) */
        .row-4 { width: 25%; background-color: #fabcbf; }
    </style>
</head>
<body>

<table>
    <!-- 第一行：合併為一格 (100%) -->
    <tr>
        <td colspan="4" class="row-1">第一行：100%</td>
    </tr>
    
    <!-- 第二行：兩格 (每格 50%) -->
    <tr>
        <td colspan="2" class="row-2">第二行 (1)：50%</td>
        <td colspan="2" class="row-2">第二行 (2)：50%</td>
    </tr>
    
    <!-- 第三行：三格 (每格 33.33%) -->
    <!-- 注意：標準 4 欄表格難以完美對齊三格，此處採獨立寬度分配 -->
    <tr>
        <td colspan="1" class="row-3" style="width: 33.33%;">第三行 (1)：33.33%</td>
        <td colspan="2" class="row-3" style="width: 33.34%;">第三行 (2)：33.34%</td>
        <td colspan="1" class="row-3" style="width: 33.33%;">第三行 (3)：33.33%</td>
    </tr>
    
    <!-- 第四行：四格 (每格 25%) -->
    <tr>
        <td class="row-4">25%</td>
        <td class="row-4">25%</td>
        <td class="row-4">25%</td>
        <td class="row-4">25%</td>
    </tr>
</table>

</body>
</html>
