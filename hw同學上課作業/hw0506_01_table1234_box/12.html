<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <style>
    table {
        width: 100%;
        border-collapse: collapse; /* 讓邊框合併 */
        margin-top: 20px;
    }
    td {
        border: 1px solid #ccc;
        padding: 20px;
        text-align: center;
    }
    /* 製作淡藍色 box 的樣式 */
    .blue-box {
        background-color: #e3f2fd; /* 淡藍色 */
        padding: 10px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
</style>

<table>
    <!-- 第一行：1 格 (跨 4 欄) -->
    <tr>
        <td colspan="4">
            <div class="blue-box">第一行 (1/1)</div>
        </td>
    </tr>
    
    <!-- 第二行：2 格 (每格跨 2 欄) -->
    <tr>
        <td colspan="2"><div class="blue-box">第二行 (1/2)</div></td>
        <td colspan="2"><div class="blue-box">第二行 (2/2)</div></td>
    </tr>
    
    <!-- 第三行：3 格 (無法整除時，通常採 2+1+1 或其他比例) -->
    <!-- 註：若要精確平分，通常會建議改用 CSS Grid，table 較難平分 3 格在 4 欄中 -->
    <tr>
        <td colspan="2"><div class="blue-box">第三行 (1/3)</div></td>
        <td><div class="blue-box">2/3</div></td>
        <td><div class="blue-box">3/3</div></td>
    </tr>
    
    <!-- 第四行：4 格 (每格 1 欄) -->
    <tr>
        <td><div class="blue-box">1/4</div></td>
        <td><div class="blue-box">2/4</div></td>
        <td><div class="blue-box">3/4</div></td>
        <td><div class="blue-box">4/4</div></td>
    </tr>
</table>
</body>
</html>
