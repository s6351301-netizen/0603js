<!DOCTYPE html>
<html>
<style>
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  td {
    border: 1px solid black;
    padding: 10px;
    text-align: center;
    vertical-align: middle;
    height: 120px;
    font-size: 60px;
  }

  img {
    max-width: 100%;
    max-height: 100%;
    object-fit: cover;
    display: block;
    margin: auto;
  }
</style>

<body>

  <div>
    <img src="/images/01.png" width="100%">
    <img src="/images/02.png" width="100%">
    <img src="/images/03.png" width="100%">
    <img src="/images/05.png" width="100%">
  </div>

  <table>
    <tr>
      <th><img src="/images/04.png"></th>
      <th><img src="/images/03.png"></th>
    </tr>
    <tr>
      <td>這是第一頁</td>
      <td>這是第二頁</td>
    </tr>

  </table>

</body>

</html>
