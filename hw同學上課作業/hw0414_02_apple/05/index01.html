<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>航海王介紹</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            margin: 20px;
        }
        h1 {
            color: #d62828;
            text-align: center;
        }
        h2 {
            color: #003049;
        }
        .box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        img {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            display: block;
            margin: 10px auto;
        }
    </style>
</head>
<body>

    <h1>🏴‍☠️ 航海王（ONE PIECE）介紹</h1>

    <div class="box">
        <h2>👑 海盜王是誰？</h2>
        <img src="https://upload.wikimedia.org/wikipedia/en/1/1c/Gol_D_Roger.png">
        <p>
            海盜王是「哥爾・D・羅傑」，擁有世界上一切財富與名聲。
            他的一句話開啟了大海賊時代。
        </p>
    </div>

    <div class="box">
        <h2>🌊 故事背景</h2>
        <img src="https://upload.wikimedia.org/wikipedia/en/2/2f/Monkey_D_Luffy.png">
        <p>
            主角魯夫為了成為海盜王，與夥伴組成草帽海賊團，
            展開偉大航道的冒險。
        </p>
    </div>

    <div class="box">
        <h2>📖 現在劇情進度</h2>
        <img src="https://upload.wikimedia.org/wikipedia/en/0/0c/Gear_5_Luffy.png">
        <ul>
            <li>魯夫覺醒「尼卡形態」</li>
            <li>世界進入最終章</li>
            <li>四皇勢力變動</li>
            <li>世界政府秘密逐漸揭露</li>
        </ul>
    </div>

    <div class="box">
        <h2>🏴‍☠️ 草帽海賊團</h2>
        <img src="https://upload.wikimedia.org/wikipedia/en/9/9a/Straw_Hat_Pirates.png">
        <p>
            魯夫與他的夥伴們，一起朝夢想前進！
        </p>
    </div>

</body>
</html>
