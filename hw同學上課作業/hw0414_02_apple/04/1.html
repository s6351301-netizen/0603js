<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糖醋魚圖鑑 - 垂直排列</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center; /* 讓內容水平置中 */
            font-family: sans-serif;
        }

        h1 {
            color: #333;
        }

        .image-container {
            width: 100%;
            max-width: 800px; /* 限制最大寬度，避免在大螢幕上過大 */
            display: flex;
            flex-direction: column;
            gap: 20px; /* 圖片之間的間距 */
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px; /* 圓角效果 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* 陰影效果 */
        }

        footer {
            margin-top: 40px;
            color: #888;
            font-size: 0.9em;
        }

    table,
    th,
    td {
        /* border: 1px solid black; */
    }

    </style>
</head>
<body>

    <h1>糖醋魚製作圖鑑</h1>

    <div class="image-container">
        <img src=".\web0414\web0414\01.png" alt="步驟 1">
        <img src=".\web0414\web0414\02.png" alt="步驟 2">
        <img src=".\web0414\web0414\03.png" alt="步驟 3">
           <table style="width:100%">
        <tr>
            <td>
                <img src=".\web0414\web0414\03-1.png" alt="Trulli" width="100%">

            </td>
            <td>
                <img src=".\web0414\web0414\03-2.png" alt="Trulli" width="100%">

            </td>
        </tr>
    </table>
        <img src=".\web0414\web0414\04.png" alt="步驟 4">
    </div>

    <footer>美味呈現</footer>

</body>
</html>
