<!DOCTYPE html>
<html lang="zh-TW">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>個人資料表單</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                padding: 20px;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .container {
                background: white;
                border-radius: 15px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                width: 100%;
                max-width: 600px;
                padding: 40px;
                animation: slideIn 0.5s ease-out;
            }

            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .form-header {
                text-align: center;
                margin-bottom: 30px;
            }

            .form-header h1 {
                color: #333;
                font-size: 28px;
                margin-bottom: 10px;
            }

            .form-header p {
                color: #666;
                font-size: 14px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            label {
                display: block;
                margin-bottom: 8px;
                color: #333;
                font-weight: 600;
                font-size: 14px;
            }

            input[type="text"],
            input[type="number"],
            input[type="date"],
            input[type="file"],
            textarea {
                width: 100%;
                padding: 12px 15px;
                border: 2px solid #e0e0e0;
                border-radius: 8px;
                font-size: 14px;
                font-family: inherit;
                transition: all 0.3s ease;
            }

            input[type="text"]:focus,
            input[type="number"]:focus,
            input[type="date"]:focus,
            input[type="file"]:focus,
            textarea:focus {
                outline: none;
                border-color: #667eea;
                box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            }

            .form-section {
                margin-bottom: 25px;
                padding-bottom: 25px;
                border-bottom: 1px solid #f0f0f0;
            }

            .form-section:last-child {
                border-bottom: none;
            }

            h4 {
                color: #667eea;
                font-size: 16px;
                margin-bottom: 15px;
                padding-bottom: 8px;
                border-bottom: 2px solid #667eea;
                display: inline-block;
            }

            .radio-group {
                display: flex;
                gap: 20px;
                margin-top: 10px;
            }

            .radio-group label {
                display: flex;
                align-items: center;
                margin-bottom: 0;
                font-weight: 400;
            }

            input[type="radio"],
            input[type="checkbox"] {
                width: 18px;
                height: 18px;
                margin-right: 8px;
                cursor: pointer;
                accent-color: #667eea;
            }

            .checkbox-group {
                display: flex;
                flex-direction: column;
                gap: 12px;
                margin-top: 12px;
            }

            .checkbox-group label {
                display: flex;
                align-items: center;
                margin-bottom: 0;
                font-weight: 400;
                cursor: pointer;
            }

            textarea {
                resize: vertical;
                min-height: 100px;
            }

            .image-preview {
                text-align: center;
                margin: 20px 0;
            }

            .image-preview img {
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
                max-width: 100%;
                height: auto;
            }

            .button-group {
                display: flex;
                gap: 10px;
                margin-top: 30px;
            }

            button {
                flex: 1;
                padding: 12px 20px;
                border: none;
                border-radius: 8px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .submit-btn {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
            }

            .submit-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            }

            .reset-btn {
                background: #f0f0f0;
                color: #333;
            }

            .reset-btn:hover {
                background: #e0e0e0;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <div class="form-header">
                <h1>📋 個人資料表單</h1>
                <p>請填寫以下資訊</p>
            </div>

            <form action="">
                <div class="form-group">
                    <label for="name">姓名 *</label>
                    <input type="text" name="name" id="name" placeholder="請輸入您的姓名">
                </div>

                <div class="form-group">
                    <label for="age">年齡 *</label>
                    <input type="number" name="age" id="age" placeholder="請輸入年齡">
                </div>

                <div class="form-group">
                    <label>性別 *</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="男"> 男</label>
                        <label><input type="radio" name="gender" value="女"> 女</label>
                        <label><input type="radio" name="gender" value="保密"> 保密</label>
                    </div>
                </div>

                <div class="form-section">
                    <h4>🚗 交通工具選擇</h4>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="vehicle[]" value="Bike"> 我有一輛自行車</label>
                        <label><input type="checkbox" name="vehicle[]" value="Car"> 我有一輛汽車</label>
                        <label><input type="checkbox" name="vehicle[]" value="Boat"> 我有一艘船</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="birthdate">出生年月日 *</label>
                    <input type="date" name="birthdate" id="birthdate">
                </div>

                <div class="form-group">
                    <label for="photo">大頭貼</label>
                    <input type="file" name="photo" id="photo" accept="image/*">
                </div>

                <div class="image-preview">
                    <img src="1.jpg" alt="大頭貼預覽" width="300" height="200">
                </div>

                <div class="form-group">
                    <label for="mynote">備註</label>
                    <textarea name="mynote" id="mynote" placeholder="請輸入任何補充說明..."></textarea>
                </div>

                <div class="button-group">
                    <button type="submit" class="submit-btn">✓ 提交</button>
                    <button type="reset" class="reset-btn">✕ 清除</button>
                </div>
            </form>
        </div>
    </body>

</html>
