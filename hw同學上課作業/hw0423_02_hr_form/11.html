<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表單範例</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #667eea;
            font-size: 2em;
            text-align: center;
            margin-bottom: 30px;
        }

        .back-link {
            display: inline-block;
            padding: 12px 25px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            display: block
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="date"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: border-color 0.3s ease;
            background-color: white;
            cursor: pointer;
        }

        input[type="date"]:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 美化日期選擇器的圖示 */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            font-size: 1.2em;
            filter: invert(40%) sepia(60%) saturate(400%) hue-rotate(220deg);
        }

        /* 將 checkbox 變成圓形 */
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            min-width: 18px;
            min-height: 18px;
            max-width: 18px;
            max-height: 18px;
            width: 18px;
            height: 18px;
            border: 2px solid #667eea;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: white;
            box-sizing: content-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        input[type="checkbox"]:checked {
            background-color: #667eea;
            border-color: #667eea;
        }

        input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
        }

        input[type="checkbox"]:hover {
            border-color: #5a67d8;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        input[type="submit"] {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        input[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>

<body>

    <div class="container">

        <div style="text-align: center; margin-bottom: 20px;">
            <a href="index.html" class="back-link">← 返回首頁</a>
        </div>

        <h1>表單範例</h1>



        <form action="/action_page.php">

                <div>
                    <label for="fname">名字：</label>
                    <input type="text" id="fname" name="fname" value="Leo">
                </div>
                
                <div>
                    <label for="lname">姓氏：</label>
                    <input type="text" id="lname" name="lname" value="Yu">
                </div>

                <div style="display: inline-flex; align-items: center; gap: 10px;">
                    <label for="gender">性別：</label>
                    <input type="radio" id="male" name="gender" value="Male">
                    <label for="male">男</label>
                    <input type="radio" id="female" name="gender" value="Female">
                    <label for="female">女</label>
                    <input type="radio" id="secret" name="gender" value="Secret">
                    <label for="secret">保密</label>
                </div>
                
                <div style="display: inline-flex; align-items: center; gap: 10px; width: 100%;">
                    <label for="birthday" style="white-space: nowrap; margin-bottom: 0;">出生日期：</label>
                    <input type="date" id="birthday" name="birthday" value="1987-03-03">
                    <input type="checkbox" id="birthday-secret" name="birthday-secret" value="secret">
                    <label for="birthday-secret" style="margin-bottom: 0; white-space: nowrap;">保密</label>
                </div>

                <div style="display: block; width: 100%;">
                    <label for="methodOfTraffic" style="margin-bottom: 0; white-space: nowrap;">請選擇你的交通工具</label>
                    <div style="display: flex; align-items: center; gap: 20px; margin-top: 10px;">
                        <input type="checkbox" id="bicycle" name="methodOfTraffic" style="display: inline-block;">
                        <label for="bicycle" style="margin-bottom: 0; white-space: nowrap;">I have a bicycle</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 20px; margin-top: 10px;">
                        <input type="checkbox" id="car" name="methodOfTraffic" style="display: inline-block;">
                        <label for="car" style="margin-bottom: 0; white-space: nowrap;">I have a car</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 20px; margin-top: 10px;">
                        <input type="checkbox" id="bus" name="methodOfTraffic" style="display: inline-block;">
                        <label for="bus" style="margin-bottom: 0; white-space: nowrap;">I have a bus</label>
                    </div>
                </div>

                <div>
                    <input type="file" id="myfile" name="myfile" value="選擇檔案">
                </div>

                <div>
                    <label for="message">備註：</label>
                    <textarea name="message" rows="10" cols="50" placeholder="請輸入您的備註..."></textarea>
                </div>

                <br>

                <input type="submit" value="提交">


                </form>
            </div>

    <script>
        const birthdayInput = document.getElementById('birthday');
        const secretCheckbox = document.getElementById('birthday-secret');

        secretCheckbox.addEventListener('change', function () {
            if (this.checked) {
                birthdayInput.style.display = 'none';
                birthdayInput.removeAttribute('required');
            } else {
                birthdayInput.style.display = '';
                birthdayInput.setAttribute('required', '');
            }
        });
    </script>


</body>

</html>
