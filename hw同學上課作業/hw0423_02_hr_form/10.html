<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM練習</title>

    <style>

    </style>
</head>

<body>
    <H1 style="text-align: center;"> FORM練習</H1>
    
    <form action="">
        <fieldset>
            <legend style="text-align: center;">充電中</legend>
            
            <div class="form-group">
                <label for="name">姓名：</label>
                <input type="text"  name="name"><br>
                <label for="englishname">英文姓名：</label>
                <input type="text"  name="name"><br>
                <div class="field">
                    <div class="chckbox-goup">
                        性別:
                        <label><input type="radio" name="M">男</label>
                        <label><input type="radio" name="F">女</label>
                    </div>
                </div>
                <label for="">出生日期：</label>
                <input type="date"><br>
                <label for="">身分證字號：</label>
                <input type="text"  name="name"><br>
                <label for="">聯絡電話：</label>
                <input type="text"  name="name"><br>
                <label for="">電子郵件：</label>
                <input type="text"  name="name"><br>
                <label for="">通訊地址：</label>
                <input type="text"  name="name"><br>
                <label for="">戶籍地址：</label>
                <input type="text" name="name"><br>
                <label for="">最高學歷 (學校名稱)(系所)</label>
                <input type="text" name="name"><br>
                <label for="">前一家公司名稱：(參考用)</label>
                <input type="text"  name="name"><br>
                <label for="">銀行名稱：</label>
                <input type="text"name="name"><br>
                <label for="">分行名稱:</label>
                <input type="text" name="name"><br>
                <label for="">帳號:</label>
                <input type="text"  name="name"><br>
                <label for="Account Holder">戶名</label>
                <input type="text" name="name"><br>
                <br>
            </div>
            <div class="checklist-container">
                入職繳交文件清單<br>
                <input type="checkbox" name="skills" value="html">
                <label for="Copy of ID">身分證:</label><br>
                <input type="checkbox" name="skills" value="html">
                <label for="Copy of Highest Degree Diploma">最高學歷證書影本:</label><br>
                <input type="checkbox" name="skills" value="html">
                <label for="Copy of Bank Passbook Cover">薪資轉帳存摺封面影本:</label><br>
                <input type="checkbox" name="skills" value="html">
                <label for="Separation Lette">前職離職證明 :</label><br>
                <input type="checkbox" name="skills" value="html">
                <label for="Digital Headshot">個人大頭照 :</label><br>
                <input type="checkbox" name="skills" value="html">
                <label for="Health Check Report">體檢報告:</label><br>
            </div>
            <p>
                聲明與簽署 (Declaration & Signature)
                中： 我確認以上所填寫之資料均屬實，並同意公司將此資料用於薪資發放、保險投保及緊急聯繫之目的。
            <div>
                <textarea name="textarea" style="width: 80%; height: 250px;">


                </textarea>
            </div>
            <div class="signature-sectio">
                <div class="sig-box">
                    員工簽名:
                </div>
                <div class="sig-box">
                    日期:
                </div>
            </div>
            </p>
 </fieldset>
    </form>
   
</body>

</html>
