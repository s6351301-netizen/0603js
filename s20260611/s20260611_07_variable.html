<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 300px;
            height: 300px;
            background-color: lightblue;
            margin: auto;
        }

        .bg-pink {
            background-color: lightpink;
        }
    </style>
</head>
<div class="box">

</div>

<body>
    <script>
        // variable
        // var / let / const / 直接使用

        // var vs let vs 直接使用
        // var 少用 萬能key 全域變數
        // let 區域變數 只能在block內使用 
        // const 常數 只能宣告一次 不能改變 也是區域變數 只能在block內使用
        // 直接使用 也是全域變數 建議不要用
        // 懶人包 只使用let

        let big = 100;
        console.log('big', big);

        if (true) {
            let a = 10;
            // let a = 10;
            a = 15;
            let b = 10;
            var c = 10;
            d = 10;
            console.log('a', a);
            console.log('big', big);

            const myConst = 55688;
        }
        // console.log('myConst', myConst);

        // console.log('b', b);
        // console.log('b', b);
        console.log('c', c);
        console.log('d', d);

        // let vs const 
        // let 變數 可以改變
        // const 常數 不可改變

        const test = 3.14;
        // test = 12345;
        console.log('test', test);

        // 1.bind 如果不可以改變 我們就使用const
        // const 不能只接改變
        // 內部是可以更動的
        const box = document.querySelector(".box");
        box.setAttribute('class', 'box bg-pink');
        // box = 12345;
        console.log('box', box);

    </script>
</body>

</html>
