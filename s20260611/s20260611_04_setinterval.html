<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 300px;
            height: 300px;
            background-color: lightblue;
            margin: auto;
        }

        .bg-blue {
            background-color: lightblue;
        }

        .bg-pink {
            background-color: lightpink;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="box">

    </div>
    <br>
    <div class="container">
        <button type="button" id="myBtn">myBtn</button>
    </div>


    <script>
        // 1.bind
        let myBtn = document.getElementById("myBtn");
        let box = document.querySelector(".box");

        // flag
        let isPink = false;

        // timer
        // setInterval() 暫存
        let timer = null;

        console.log('myBtn', myBtn);
        console.log('box', box);

        // 2.action
        myBtn.addEventListener('click', function () {

            // if timer is not null, stop timer 跳出
            if (timer) {
                clearInterval(timer);
                timer = null;
                console.log('timer 已存在');
                return false;
            }


            console.log('myBtn click ok');

            box.setAttribute("class", "box bg-pink");
            // hidden
            // myBtn.style.display = "none";

            // setTimeout(function,時間(毫秒) 時間到 執行function
            // function 在裡面 不用function name
            timer = setInterval(function () {
                console.log('timer', timer);
                if (isPink) {
                    box.setAttribute("class", "box bg-blue");
                    isPink = false;
                } else {
                    box.setAttribute("class", "box bg-pink");
                    isPink = true;
                }
            }, 300);

            // 小練習?
            // 1. 連續按下去 會一直新增 setInterval ?
            // 2. stop 停止 setInterval 

         
            // 1.start visible stop hidden
            // 2.start hidden stop visible

        });
    </script>
</body>

</html>
