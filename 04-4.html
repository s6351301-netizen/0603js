<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宗族大樹祈願牆 - 飲水思源 • 世代感恩</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* ================= 整合您提供的星空背景語法 ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Noto Serif TC", "PingFang TC", serif;
            color: #e2e8f0; /* 全域文字改為淺色以契合夜空 */
            height: 100vh;
            display: flex;
            overflow: hidden; 

            background-color: #020308;
            /* 1. 繪製不同大小、模糊度的白色星點與星雲底色 */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),  /* 第一層星點 */
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px), /* 第二層星點 */
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px),  /* 第三層星點 */
                radial-gradient(circle at center, #0b1126 0%, #020308 80%);          /* 中央星雲漸層 */
            
            /* 2. 定義每層星點的平鋪尺寸 */
            background-size: 550px 550px, 350px 350px, 250px 250px, 100% 100%;
            
            /* 固定背景不隨網頁捲動 */
            background-attachment: fixed; 

            /* 3. 套用無限流動動畫：時長 60 秒、無限循環、線性勻速 */
            animation: starStream 60s infinite linear;
        }

        /* 4. 控制背景點點移動軌跡的動畫主體 */
        @keyframes starStream {
            0% { 
                background-position: 0 0, 0 0, 0 0, center; 
            }
            100% { 
                /* 讓前三層點點往不同的 X 與 Y 軸座標位移，產生錯開的立體流動感 */
                background-position: 550px 1100px, -350px 700px, 500px -500px, center; 
            }
        }   

        /* ================= 左側結果呈現區 (70%) ================= */
        .main-content {
            width: 70%;
            height: 100vh;
            overflow-y: auto; 
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 左側頁首 */
        header {
            text-align: center;
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
            animation: fadeInDown 1s ease;
        }
        header h1 {
            font-size: 2.6rem;
            color: #52b788; /* 亮綠色，在夜空中像發光的樹葉 */
            margin-bottom: 12px;
            letter-spacing: 3px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(82, 183, 136, 0.5);
        }
        header p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #cbd5e1;
        }

        /* 祈願牆網格佈局 */
        .wish-wall {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            padding-bottom: 40px;
        }

        /* 祈願卡片外觀（微透光星光質感） */
        .wish-card {
            background: rgba(255, 255, 255, 0.08); /* 半透明白 */
            border-top: 4px solid #52b788; /* 發光綠頂邊 */
            border-radius: 6px 6px 12px 12px;
            padding: 22px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px); /* 磨砂玻璃效果 */
            -webkit-backdrop-filter: blur(8px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            transform-origin: top center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s, background 0.3s;
        }
        
        /* 滑過卡片時的發光放大效果 */
        .wish-card:hover {
            transform: scale(1.05) rotate(0deg) !important; 
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 25px rgba(82, 183, 136, 0.3);
            z-index: 10;
        }

        /* 卡片上方固定器（星芒/吊環意象） */
        .wish-card::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            background: #ffd166; /* 金色發光點 */
            border-radius: 50%;
            box-shadow: 0 0 8px #ffd166;
        }

        /* 卡片內容文字 */
        .wish-content {
            font-size: 1rem;
            line-height: 1.6;
            color: #f8fafc;
            margin-bottom: 15px;
            min-height: 60px;
            white-space: pre-line;
        }
        .wish-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            border-top: 1px dashed rgba(255, 255, 255, 0.2);
            padding-top: 10px;
        }
        .wish-author {
            font-weight: bold;
            color: #ffd166; /* 名字用金色凸顯 */
        }
        .wish-generation {
            background-color: rgba(82, 183, 136, 0.2);
            color: #52b788;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid rgba(82, 183, 136, 0.4);
        }

        /* 新增卡片的動畫 */
        .new-card-animate {
            animation: dropIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }


        /* ================= 右側輸入資料區 (30%) ================= */
        .sidebar {
            width: 30%;
            height: 100vh;
            background: rgba(11, 17, 38, 0.6); /* 配合夜空星雲的深藍透明底 */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.5);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeInRight 1s ease;
        }

        .counter-box {
            font-size: 1rem;
            background: rgba(82, 183, 136, 0.15);
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            color: #52b788;
            font-weight: bold;
            margin-bottom: 30px;
            border: 1px solid rgba(82, 183, 136, 0.3);
        }
        .counter-box span {
            font-size: 1.4rem;
            color: #ff4d6d;
            margin: 0 4px;
            text-shadow: 0 0 8px rgba(255, 77, 109, 0.5);
        }

        .form-title {
            font-size: 1.4rem;
            color: #52b788;
            margin-bottom: 25px;
            font-weight: bold;
            border-bottom: 2px solid #52b788;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            background-color: rgba(2, 3, 8, 0.6);
            color: #fff;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #52b788;
            box-shadow: 0 0 8px rgba(82, 183, 136, 0.4);
            background-color: rgba(2, 3, 8, 0.8);
        }
        /* 讓下拉選單的選項在深色背景下看得到 */
        select option {
            background-color: #0b1126;
            color: #fff;
        }
        textarea {
            resize: none;
            height: 120px;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #52b788, #2d6a4f);
            color: #fff;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(82, 183, 136, 0.3);
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(82, 183, 136, 0.5);
        }

        /* 側邊欄底部的版權宣告 */
        .sidebar-footer {
            margin-top: auto;
            font-size: 0.85rem;
            color: #94a3b8;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        /* ================= 動態效果 Keyframes ================= */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes dropIn {
            from { opacity: 0; transform: scale(0.5) translateY(-60px) rotate(-15deg); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <header>
            <h1>林氏宗族大樹祈願牆</h1>
            <p>「一柱鋤頭落地開，千重稻浪代代傳。」<br>因有先祖深埋泥土的根，才有今日如繁星般閃耀的子孫。請見證後代對您的思念。</p>
        </header>

        <div class="wish-wall" id="wishWall"></div>
    </div>


    <div class="sidebar">
        <div class="counter-box">
            目前已有 <span id="wishCount">0</span> 枝子孫祈願葉
        </div>

        <div class="form-title">✨ 撰寫祈願卡</div>
        
        <form id="wishForm">
            <div class="form-group">
                <label for="author">您的姓名 / 稱呼</label>
                <input type="text" id="author" placeholder="例如：大房 國華" required>
            </div>

            <div class="form-group">
                <label for="generation">世代輩分</label>
                <select id="generation" required>
                    <option value="" disabled selected>請選擇輩分</option>
                    <option value="來台第五代">來台第五代 (常字輩)</option>
                    <option value="來台第六代">來台第六代 (顯字輩)</option>
                    <option value="來台第七代">來台第七代 (榮字輩)</option>
                    <option value="來台第八代">來台第八代 (昌字輩)</option>
                    <option value="來台第九代">來台第九代 (後輩)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="content">寫給祖先的話 / 家族祈願</label>
                <textarea id="content" placeholder="請寫下您對先祖默默耕耘的感念，或是對林氏後代子孫的祝福..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">掛上祈願牆 ➔</button>
        </form>

        <div class="sidebar-footer">
            林氏宗族後代子孫 敬立<br>歲時感恩牆 • 2026
        </div>
    </div>


    <script>
        // 預設的初始資料
        const initialWishes = [
            {
                author: "長房大堂哥 國華",
                generation: "來台第六代",
                content: "感念曾祖父當年用一雙長滿繭的手，一鋤一鋤地在這片荒地挖出水田。如今我們雖然不再務農，但那份刻苦耐勞、腳踏實地的家風，我一定會繼續傳給下一代。"
            },
            {
                author: "二房 佩芬",
                generation: "來台第六代",
                content: "小時候總聽阿公說『吃米擔水要思源』。長大後進了都市工作，每當遇到挫折，想到祖先們當年渡海與對抗天災的堅韌，就覺得自己充滿力量。"
            },
            {
                author: "三房 志明",
                generation: "來台第七代",
                content: "每到秋收時節，看著金黃色的稻浪，就彷彿看見公媽們微笑的臉龐。願林氏家族就像這棵大樹一樣，根深蒂固，開花結果。"
            },
            {
                author: "小妹 雅婷",
                generation: "來台第七代",
                content: "謝謝阿太、阿公、阿嬤一輩子守護這片土地，讓我們有家可回、有根可尋。每當回到三合院，心裡就無比踏實。"
            }
        ];

        // 渲染單張卡片的函式
        function createCardElement(author, generation, content, isNew = false) {
            const card = document.createElement('div');
            card.className = 'wish-card';
            if (isNew) {
                card.classList.add('new-card-animate'); 
            }

            // 讓卡片產生隨機微幅旋轉
            const randomRotate = (Math.random() * 8 - 4).toFixed(1);
            card.style.transform = `rotate(${randomRotate}deg)`;

            card.innerHTML = `
                <div class="wish-content">「${content}」</div>
                <div class="wish-meta">
                    <span class="wish-author">${author}</span>
                    <span class="wish-generation">${generation}</span>
                </div>
            `;
            return card;
        }

        // 更新計數器
        function updateCounter() {
            const total = document.getElementById('wishWall').children.length;
            document.getElementById('wishCount').innerText = total;
        }

        // 頁面初始化
        function initWall() {
            const wallContainer = document.getElementById('wishWall');
            initialWishes.forEach(wish => {
                const card = createCardElement(wish.author, wish.generation, wish.content, false);
                wallContainer.appendChild(card);
            });
            updateCounter();
        }

        // 監聽表單送出
        document.getElementById('wishForm').addEventListener('submit', function(e) {
            e.preventDefault(); 

            const authorInput = document.getElementById('author').value;
            const genSelect = document.getElementById('generation').value;
            const contentInput = document.getElementById('content').value;

            const wallContainer = document.getElementById('wishWall');

            const newCard = createCardElement(authorInput, genSelect, contentInput, true);
            wallContainer.insertBefore(newCard, wallContainer.firstChild);

            updateCounter();

            document.querySelector('.main-content').scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('wishForm').reset();
        });

        window.addEventListener('DOMContentLoaded', initWall);
    </script>
</body>
</html>
